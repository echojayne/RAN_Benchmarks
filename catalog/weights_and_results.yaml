traffic_prediction:
  itransformer:
    static_baseline:
      run: tasks/traffic_prediction/methods/itransformer/runs/static_baseline
      source: ${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/itransformer/assets/static_baseline
      protocol: main_64cell_context24_horizon6
      weights:
        - best.pt
      training: train_history.json
    well_done_citywide_noholiday_r2filtered:
      run: tasks/traffic_prediction/methods/itransformer/runs/well_done_citywide_noholiday_r2filtered
      source: ${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/itransformer/assets/well_done_citywide_noholiday_r2filtered
      protocol: citywide_9943cell_context3_horizon1
      code_copy: tasks/traffic_prediction/methods/itransformer/citywide_compat
      weights:
        - checkpoints/best.pt
      performance:
        - metrics/per_cell_metrics.csv
  lstm:
    train_run:
      run: tasks/traffic_prediction/methods/lstm/runs/train_run
      source: ${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/baselines/lstm/assets/train_run
      weights:
        - best.pt
      training: train_history.json
  tcn:
    train_run:
      run: tasks/traffic_prediction/methods/tcn/runs/train_run
      source: ${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/baselines/tcn/assets/train_run
      weights:
        - best.pt
      training: train_history.json
  naive:
    eval_run:
      run: tasks/traffic_prediction/methods/naive/runs/eval_run
      source: ${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/baselines/naive/assets/eval_run
      performance:
        - metrics_summary.csv
        - metrics_summary.json
        - per_sample_metrics.csv
  seasonal_naive:
    eval_run:
      run: tasks/traffic_prediction/methods/seasonal_naive/runs/eval_run
      source: ${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/baselines/seasonal_naive/assets/eval_run
      performance:
        - metrics_summary.csv
        - metrics_summary.json
        - per_sample_metrics.csv
  weekly_seasonal_naive:
    eval_run:
      run: tasks/traffic_prediction/methods/weekly_seasonal_naive/runs/eval_run
      source: ${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/baselines/weekly_seasonal_naive/assets/eval_run
      status: unavailable_for_current_protocol
      note: >
        Current 24-hour context is shorter than the 168-hour seasonal period,
        so the implementation falls back to last-value forecasting and matches
        the naive metrics.
      performance:
        - metrics_summary.csv
        - metrics_summary.json
        - per_sample_metrics.csv
  mltp:
    paper_aligned_results:
      run: tasks/traffic_prediction/methods/mltp/runs/paper_aligned_results
      source: ${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/baselines/mltp/assets/paper_aligned_results
      performance:
        - week_sweep_aggregate_with_mltp.csv
        - week_sweep_mltp_metrics.csv
        - week_sweep_mltp_per_cell.csv
  dynabert:
    itransformer_20260524:
      run: ${ELASTIC_INFERENCE_METHODS_ROOT}/methods/dynabert/assets/runs/ran_benchmarks/traffic_prediction/itransformer/itransformer_20260524
      source: ${RAN_BENCHMARK_ASSET_ROOT}/baselines/dynabert/runs/20260524/itransformer
      config: resolved_config.json
      training: train_history.json
      performance:
        - eval/itransformer_dynabert_points.csv
  matformer:
    itransformer_matformer:
      run: ${ELASTIC_INFERENCE_METHODS_ROOT}/methods/matformer/assets/runs/ran_benchmarks/traffic_prediction/itransformer/itransformer_matformer
      source: ${RAN_BENCHMARK_ASSET_ROOT}/baselines/matformer/runs/itransformer_matformer
      config: resolved_config.json
      training: train_history.json
  ofa:
    itransformer_ofa:
      run: ${ELASTIC_INFERENCE_METHODS_ROOT}/methods/ofa/assets/runs/ran_benchmarks/traffic_prediction/itransformer/itransformer_ofa
      source: ${RAN_BENCHMARK_ASSET_ROOT}/baselines/OFA/runs/itransformer_ofa
      config: resolved_config.json
      training: train_history.json

