schema_version: 1
target_root: ${RAN_BENCHMARK_ROOT}
purpose: retained_run_weight_result_index
note: >
  This file maps retained runs to known checkpoint, config, history, and
  performance artifacts. A run directory may contain additional files. When the
  original workspace does not explicitly encode a one-to-one point-to-checkpoint
  mapping, the run root is retained as the audit boundary.

channel_estimation:
  adafortitran:
    official_public_final:
      run: tasks/channel_estimation/methods/adafortitran/runs/official_public_final
      source: ${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/channel_estimation/adafortitran/assets/official_public_final
      weights:
        - best.pt
      performance:
        - README.md
      mapping_status: run_level_weight_result_boundary
    static_baseline_seed13_lr1e-3:
      run: tasks/channel_estimation/methods/adafortitran/runs/static_baseline/seed13_lr1e-3
      source: ${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/channel_estimation/adafortitran/assets/static_baseline/seed13_lr1e-3
      weights:
        - best.pt
      training:
        - train_history.json
      performance:
        - eval_full_snr/per_sample_metrics.csv
        - eval_full_snr/mse_db_vs_snr.csv
        - eval_unified_snr/per_sample_metrics.csv
        - eval_unified_doppler/per_sample_metrics.csv
        - eval_unified_delay_spread/per_sample_metrics.csv
      mapping_status: run_level_weight_result_boundary
  ammse:
    paper_strict_current_benchmark_final:
