      weights:
        - best.pt
      training:
        - train_history.json
      performance:
        - eval_snr/summary.csv
        - eval_snr/per_sample.csv
        - eval_doppler/summary.csv
        - eval_doppler/per_sample.csv
        - eval_delay_spread/summary.csv
        - eval_delay_spread/per_sample.csv
      mapping_status: run_level_weight_result_boundary
    static_baseline_seed13_lr1e-3:
      run: tasks/channel_estimation/methods/ammse/runs/static_baseline/seed13_lr1e-3
      source: ${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/channel_estimation/ammse/assets/static_baseline/seed13_lr1e-3
      weights:
        - best.pt
      training:
        - train_history.json
      performance:
        - eval_full_snr/per_sample_metrics.csv
        - eval_unified_snr/per_sample_metrics.csv
        - eval_unified_doppler/per_sample_metrics.csv
        - eval_unified_delay_spread/per_sample_metrics.csv
      mapping_status: run_level_weight_result_boundary
  dynabert:
    adafortitran_20260524:
      run: ${ELASTIC_INFERENCE_METHODS_ROOT}/methods/dynabert/assets/runs/ran_benchmarks/channel_estimation/adafortitran/adafortitran_20260524
      source: ${RAN_BENCHMARK_ASSET_ROOT}/baselines/dynabert/runs/20260524/adafortitran
      config: resolved_config.json
      training: train_history.json
      performance:
        - eval/adafortitran_dynabert_points.csv
      mapping_status: run_level_weight_result_boundary
    ammse_20260524:
      run: ${ELASTIC_INFERENCE_METHODS_ROOT}/methods/dynabert/assets/runs/ran_benchmarks/channel_estimation/ammse/ammse_20260524
      source: ${RAN_BENCHMARK_ASSET_ROOT}/baselines/dynabert/runs/20260524/ammse
