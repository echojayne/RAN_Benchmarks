version: 1
root: ${RAN_BENCHMARK_ASSET_ROOT}

tasks:
  beam_management:
    description: "Beam management benchmarks that reconstruct beam RSS spectra and select alignment beams."
    models:
      beamformer:
        task_type: "beam_management"
        source_root: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/beam_management/beamformer/source"
        dataset_processing_root: "${RAN_BENCHMARK_ASSET_ROOT}/source_snapshots/beamformer/dataset_processing"
        assets:
          mini_demo: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/beam_management/beamformer/assets/mini_demo"
          raw_sqlite_archive: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/beam_management/beamformer/assets/raw/homeoffice-communication-28G-raw-data.zip"
          raw_sqlite_dir: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/beam_management/beamformer/assets/raw/homeoffice-communication-28G-raw-data"
          generated_csi: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/beam_management/beamformer/assets/generated_csi"
          csi_dataset: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/beam_management/beamformer/assets/csi-dataset/homeoffice-communication-28G-csi"
          original_weights: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/beam_management/beamformer/assets/original_weights/final"
          original_results: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/beam_management/beamformer/results/original"

  channel_prediction:
    description: "Masked or reconstruction-style channel prediction benchmarks."
    models:
      wifo:
        task_type: "channel_prediction"
        source_root: "${RAN_BENCHMARK_ASSET_ROOT}/source_snapshots/wifo"
        assets:
          train_val_data: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/channel_prediction/wifo/assets/train_val_data"
          test_data: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/channel_prediction/wifo/assets/test_data"
          original_weights: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/channel_prediction/wifo/assets/original_weights"

  channel_estimation:
    description: "Dense field channel estimation benchmarks on OFDM data."
    shared_assets:
      train_data: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/channel_estimation/common/train_data"
      val_data: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/channel_estimation/common/val_data"
      test_data: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/channel_estimation/common/test_data"
      source_root: "${RAN_BENCHMARK_ASSET_ROOT}/source_snapshots/channel_estimation"
    models:
      adafortitran:
        assets:
          official_public_final: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/channel_estimation/adafortitran/assets/official_public_final"
          static_baseline: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/channel_estimation/adafortitran/assets/static_baseline"
          reference_curves: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/channel_estimation/adafortitran/assets/reference_curves"
      ammse:
        assets:
          paper_strict_current_benchmark_final: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/channel_estimation/ammse/assets/paper_strict_current_benchmark_final"
          static_baseline: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/channel_estimation/ammse/assets/static_baseline"

  traffic_forecasting:
    description: "Traffic forecasting benchmarks on Milan data."
    shared_assets:
      raw_data: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/common/raw_data"
      prepared_data: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/common/prepared_data"
      source_root: "${RAN_BENCHMARK_ASSET_ROOT}/source_snapshots/traffic_forecasting"
    models:
      itransformer:
        assets:
          static_baseline: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/itransformer/assets/static_baseline"
          well_done_citywide_noholiday_r2filtered: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/itransformer/assets/well_done_citywide_noholiday_r2filtered"
    baselines:
      lstm:
        assets:
          train_run: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/baselines/lstm/assets/train_run"
      tcn:
        assets:
          train_run: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/baselines/tcn/assets/train_run"
      naive:
        assets:
          eval_run: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/baselines/naive/assets/eval_run"
      seasonal_naive:
        assets:
          eval_run: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/baselines/seasonal_naive/assets/eval_run"
      weekly_seasonal_naive:
        assets:
          eval_run: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/baselines/weekly_seasonal_naive/assets/eval_run"
      mltp:
        assets:
          paper_aligned_results: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/traffic_forecasting/baselines/mltp/assets/paper_aligned_results"
