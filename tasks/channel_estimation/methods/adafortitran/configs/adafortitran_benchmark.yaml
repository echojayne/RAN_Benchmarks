reference:
  name: adafortitran_benchmark
  description: >
    Single AdaFortiTran benchmark config for the retained OFDM channel-estimation
    data line, local training entrypoint, public wrapper entrypoint, and local
    evaluation entrypoint.
  source_urls:
    - https://github.com/BerkIGuler/AdaFortiTran
    - https://github.com/BerkIGuler/OFDMChannelGenerator

dataset:
  format: adafortitran_mat_dir
  root_dir: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/channel_estimation/common"
  train_dir: train_data
  val_dir: val_data
  test_dir: test_data/SNR_test_set
  stats_split_dir: train_data
  comparison_splits:
    snr: test_data/SNR_test_set
    delay_spread: test_data/DS_test_set
    doppler: test_data/MDS_test_set

ofdm:
  num_subcarriers: 120
  num_symbols: 14
  sample_rate_hz: 3840000.0
  num_resource_blocks: 10
  subcarrier_spacing_khz: 15

pilot:
  spacing_subcarriers: 3
  offset_subcarriers: 1
  symbol_indices_zero_based: [2, 11]
  qpsk_modulation: true

channel:
  delay_profile: TDL-A
  delay_spread_ns_values: [25, 50, 75, 100, 125, 150, 175, 200, 225, 250, 275, 300]
  doppler_hz_values: [50, 100, 150, 200, 250, 300, 350, 400, 450, 500, 550, 600, 650, 700, 750, 800, 850, 900, 950, 1000]

evaluation:
  snr_db_values: [0, 5, 10, 15, 20, 25]
  metric: mse_db
  aggregate: mean_linear_mse_then_to_db
  secondary_metric: nmse
  secondary_aggregate: mean_of_per_sample_nmse

model:
  num_subcarriers: 120
  num_symbols: 14
  input_channels: 4
  output_channels: 2
  pilot_vector_length: 80
  d_enc: 32
  encoder_layers: 6
  num_heads: 4
  ffn_dim: 64
  activation: gelu
  dropout: 0.1
  max_seq_len: 512
  pos_encoding_type: learnable
  patch_subcarriers: 3
  patch_symbols: 2
  shallow_channels: 8
  hidden_channels: 32
  use_channel_adaptation: true
  channel_adaptivity_hidden_sizes: [7, 42, 560]
  adaptive_token_length: 6

training:
  output_dir: /tmp/adafortitran_train
  checkpoint_name: best.pt
  device: auto
  num_procs: 1
  batch_size: 512
  epochs: 1000
  learning_rate: 1.0e-3
  weight_decay: 0.0
  lr_gamma: 0.995
  num_workers: 8
  train_limit: 0
  val_limit: 0
  normalize_inputs: false
  early_stopping_patience: 15
  grad_clip_norm: 0.0
  seed: 7
