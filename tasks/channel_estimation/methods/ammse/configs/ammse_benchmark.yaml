reference:
  name: ammse_benchmark
  description: >
    Single curated A-MMSE benchmark config for the AdaFortiTran-format OFDM
    channel-estimation data line, local training entrypoint, local evaluation
    entrypoint, and retained paper-strict checkpoint family.
  source_urls:
    - https://arxiv.org/abs/2506.00452
    - https://github.com/TaeJun1999/Attention-aided-MMSE

dataset:
  format: adafortitran_mat_dir
  root_dir: "${RAN_BENCHMARK_ASSET_ROOT}/benchmarks/channel_estimation/common"
  train_dir: train_data
  val_dir: val_data
  test_dir: test_data/SNR_test_set
  stats_split_dir: train_data
  comparison_splits:
    snr: test_data/SNR_test_set
    delay_spread: test_data/DS_test_set
    doppler: test_data/MDS_test_set

ofdm:
  num_subcarriers: 120
  num_symbols: 14
  sample_rate_hz: 3840000.0
  num_resource_blocks: 10
  subcarrier_spacing_khz: 15

pilot:
  spacing_subcarriers: 3
  offset_subcarriers: 1
  symbol_indices_zero_based: [2, 11]
  qpsk_modulation: true

channel:
  delay_profile: TDL-A
  delay_spread_ns_values: [25, 50, 75, 100, 125, 150, 175, 200, 225, 250, 275, 300]
  doppler_hz_values: [50, 100, 150, 200, 250, 300, 350, 400, 450, 500, 550, 600, 650, 700, 750, 800, 850, 900, 950, 1000]

evaluation:
  snr_db_values: [0, 5, 10, 15, 20, 25]
  metric: mse_db
  aggregate: mean_linear_mse_then_to_db
  secondary_metric: nmse
  secondary_aggregate: mean_of_per_sample_nmse

model:
  architecture: rank_adaptive
  num_subcarriers: 120
  num_symbols: 14
  pilot_vector_length: 80
  pilot_subcarrier_tokens: 40
  pilot_symbol_tokens: 2
  d_model: 64
  num_heads: 4
  frequency_layers: 2
  temporal_layers: 2
  ffn_dim: 128
  dropout: 0.1
  filter_rank: 8
  noise_embed_dim: 32

training:
  output_dir: /tmp/ammse_train
  checkpoint_name: best.pt
  device: auto
  batch_size: 12288
  epochs: 100
  optimizer: adamw
  learning_rate: 1.0e-3
  weight_decay: 0.0
  scheduler: exponential
  lr_gamma: 0.995
  num_workers: 8
  train_limit: 0
  val_limit: 0
  early_stopping_patience: 10
  grad_clip_norm: 1.0
  seed: 13
